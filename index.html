<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退傭試算 (正式修正版)</title>
<style>
  :root { --bg: #0a0a0a; --gold: #c9a84c; --text: #f0f0f0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; max-width: 430px; margin: 0 auto; padding: 15px; }
  .btn { background: var(--gold); color: black; padding: 15px; border-radius: 25px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 20px; }
  table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #111; border-radius: 10px; }
  td { padding: 12px; border-bottom: 1px solid #222; }
</style>
</head>
<body>
<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
  <b style="color:var(--gold)">♠ 退傭試算 (1.5-Flash 正式版)</b>
  <button onclick="setKey()" style="background:none; border:none; color:#444">⚙️</button>
</div>

<button class="btn" onclick="document.getElementById('f').click()">📷 導入報表圖片開始分析</button>
<input type="file" id="f" hidden accept="image/*" onchange="run(event)">
<div id="out"></div>

<script>
function setKey() { 
  const k = prompt("請輸入您的 Gemini API Key:"); 
  if(k) { localStorage.setItem('g_key', k.trim()); location.reload(); }
}

async function run(e) {
  const file = e.target.files[0]; 
  const key = localStorage.getItem('g_key');
  if(!key) { setKey(); return; }
  
  const out = document.getElementById('out');
  out.innerHTML = "<div style='text-align:center; color:var(--gold); margin-top:20px;'>正在分析報表...</div>";

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    
    // 這裡修正了 404 錯誤：使用正確的 1.5-flash 名稱
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
    
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { text: "提取表格中的玩家ID、暱稱和服務費(Rake)，以 JSON 回傳: {players:[{id,nick,rake}]}" },
            { inline_data: { mime_type: file.type, data: base64 } }
          ]}]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const aiText = data.candidates[0].content.parts[0].text;
      const jsonStr = aiText.match(/\{[\s\S]*\}/)[0];
      const ps = JSON.parse(jsonStr).players;
      
      let h = '<table>';
      ps.forEach(p => {
        h += `<tr><td>${p.nick}<br><small style="color:#555">${p.id}</small></td><td style="text-align:right; color:var(--gold)">$${p.rake}</td></tr>`;
      });
      out.innerHTML = h + '</table>';
    } catch (err) {
      out.innerHTML = `<div style="color:red; margin-top:20px; border:1px solid red; padding:10px;">錯誤：${err.message}</div>`;
    }
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
