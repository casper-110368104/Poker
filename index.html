<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>退水試算</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#181818;
  --border:#222;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#555;--muted2:#888;
  --gold:#c8982a;--gold2:#e8b84b;
  --green:#3ddc84;--red:#ff5c5c;
  --radius:14px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:0 0 140px;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--gold2);}
.topbar-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;display:flex;align-items:center;gap:4px;}
.key-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}
.key-dot.ok{background:var(--green);}
.gear-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);color:var(--muted2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.gear-btn:active{background:var(--surface2);}

/* Settings */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(4px);}
.settings-overlay.show{display:block;}
.settings-panel{position:fixed;top:0;right:-320px;height:100%;width:300px;background:var(--surface);border-left:1px solid var(--border2);z-index:201;padding:24px 20px;overflow-y:auto;transition:right .3s cubic-bezier(.4,0,.2,1);}
.settings-panel.show{right:0;}
.settings-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.settings-hdr span{font-size:16px;font-weight:700;}
.close-btn{background:none;border:none;color:var(--muted2);font-size:20px;cursor:pointer;padding:4px;}
.s-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.key-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;}
.key-input:focus{border-color:var(--gold);}
.save-btn{width:100%;margin-top:8px;padding:10px;background:var(--gold);border:none;border-radius:10px;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font);touch-action:manipulation;}
.key-hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6;}
.key-hint a{color:var(--gold);}
.s-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.model-row{display:flex;gap:8px;}
.model-btn{flex:1;padding:10px 8px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;}
.model-btn.active{border-color:var(--gold);background:#1a1500;}
.model-btn-name{display:block;color:var(--text);font-weight:700;font-size:13px;font-family:var(--font);}
.model-btn.active .model-btn-name{color:var(--gold2);}
.model-btn-desc{display:block;color:var(--muted);font-size:10px;margin-top:3px;font-family:var(--mono);}
.model-hint{font-size:10px;color:var(--muted);margin-top:6px;font-family:var(--mono);}

/* Upload */
.upload-area{margin:20px 16px 0;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;}
.upload-area:active{border-color:var(--gold);background:#1a1500;}
.upload-icon{font-size:36px;margin-bottom:10px;}
.upload-title{font-size:15px;font-weight:700;}
.upload-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
#fi{position:absolute;inset:0;opacity:0;cursor:pointer;}
#previewImg{display:none;width:calc(100% - 32px);margin:12px 16px 0;border-radius:var(--radius);}

/* Loading */
.loading{margin:20px 16px 0;padding:24px;background:var(--surface);border-radius:var(--radius);text-align:center;font-size:13px;color:var(--muted2);}
.loading-bar{height:2px;background:var(--border2);border-radius:2px;margin-top:12px;overflow:hidden;}
.loading-bar-inner{height:100%;width:30%;background:var(--gold);border-radius:2px;animation:slide 1.2s ease-in-out infinite;}
@keyframes slide{0%{transform:translateX(-100%);}100%{transform:translateX(400%);}}

/* Validation */
#validationBox{margin:12px 16px 0;display:none;}
.vrow{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;font-family:var(--mono);border-radius:8px;margin-bottom:6px;}
.vok{background:#0a1a0e;color:var(--green);border:1px solid #1a3a20;}
.vwarn{background:#1a0e00;color:#ffaa44;border:1px solid #3a2200;}

/* Phase header */
.phase-hdr{padding:20px 16px 8px;display:flex;align-items:center;gap:10px;}
.phase-num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.phase-title{font-size:13px;font-weight:700;color:var(--muted2);letter-spacing:.5px;}

/* Select bar */
.select-bar{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.select-bar-left{display:flex;align-items:center;gap:10px;}
.chk{width:18px;height:18px;cursor:pointer;accent-color:var(--gold);}
.select-bar-label{font-size:12px;color:var(--muted2);font-weight:600;}
.select-count{font-size:11px;color:var(--gold2);font-family:var(--mono);}

/* Player card */
.pcard{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s,background .15s;}
.pcard.sel{border-color:var(--gold);background:#111100;}
.prow{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pid{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.pnl-pos{color:var(--green);font-size:12px;font-weight:700;font-family:var(--mono);}
.pnl-neg{color:var(--red);font-size:12px;font-weight:700;font-family:var(--mono);}
.prake{font-size:10px;color:var(--muted);font-family:var(--mono);}
.agent-badge{font-size:9px;background:var(--gold);color:#000;padding:1px 5px;border-radius:4px;font-weight:800;margin-left:5px;vertical-align:middle;}

/* PCT row */
.pct-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 8px;border-top:1px solid var(--border);background:#0e0e0e;}
.pct-label{font-size:11px;color:var(--muted);}
.pct-ctrls{display:flex;align-items:center;gap:5px;}
.pct-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;touch-action:manipulation;}
.pct-btn:active{background:#333;}
.pct-val{min-width:40px;text-align:center;font-size:13px;font-weight:700;color:var(--gold2);font-family:var(--mono);}
.rebate-val{font-size:13px;font-weight:700;color:var(--gold2);font-family:var(--mono);}

/* Settle row */
.settle-row{padding:0 14px 10px;display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);}
.settle-label{color:var(--muted);}
.settle-pos{color:var(--green);font-weight:700;}
.settle-neg{color:var(--red);font-weight:700;}

/* Global bar */
.global-bar{margin:0 16px 12px;background:#0e0e06;border:1px solid #2a2a10;border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.global-bar-label{font-size:11px;color:var(--muted2);font-weight:600;flex:1;}
.global-apply{background:var(--gold);border:none;border-radius:8px;color:#000;font-weight:700;font-size:12px;padding:0 14px;height:32px;cursor:pointer;font-family:var(--font);touch-action:manipulation;}

/* CTA buttons */
.cta-btn{width:100%;padding:14px;background:var(--gold);border:none;border-radius:var(--radius);color:#000;font-weight:800;font-size:15px;cursor:pointer;font-family:var(--font);touch-action:manipulation;}
.back-btn{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted2);font-weight:600;font-size:13px;cursor:pointer;font-family:var(--font);}

/* Static summary block */
.static-summary{margin:8px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;}
.ssum-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.ssum-label{font-size:12px;color:var(--muted2);}
.ssum-val{font-size:13px;font-weight:700;font-family:var(--mono);}
.ssum-divider{border:none;border-top:1px solid var(--border);margin:10px 0;}
.ssum-mycut{display:flex;align-items:center;gap:8px;}
.ssum-amt{font-size:16px;font-weight:800;color:var(--gold2);font-family:var(--mono);margin-left:auto;}

/* Summary (floating - phase 1 only) */
.summary{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border2);padding:12px 16px 24px;z-index:90;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.sum-label{font-size:12px;color:var(--muted2);}
.sum-val{font-size:13px;font-weight:700;font-family:var(--mono);}
.sum-val.gold{color:var(--gold2);}
.sum-divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.mycut-row{display:flex;align-items:center;gap:8px;padding-top:4px;}
.mycut-label{font-size:12px;color:var(--muted2);flex:1;}
.mycut-amt{font-size:16px;font-weight:800;color:var(--gold2);font-family:var(--mono);}

/* Error */
.error-box{margin:12px 16px;padding:14px;background:#1a0808;border:1px solid #3a1515;border-radius:var(--radius);font-size:13px;color:var(--red);line-height:1.5;}

/* Debug */
.debug-btn{display:none;width:calc(100% - 32px);margin:8px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--mono);}
.debug-btn.show{display:block;}
#debugOut{display:none;margin:0 16px;background:#060606;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:10px;color:#555;font-family:var(--mono);white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto;}
#debugOut.show{display:block;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <div class="topbar-title">退水試算</div>
      <div class="topbar-sub">
        <span class="key-dot" id="keyDot"></span>
        <span id="keyStatus">未設定 API Key</span>
      </div>
    </div>
    <button class="gear-btn" id="gearBtn">⚙️</button>
  </div>

  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-hdr">
      <span>設定</span>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="s-label">Gemini API Key</div>
    <input type="password" class="key-input" id="keyInput" placeholder="AIza..." autocomplete="off">
    <button class="save-btn" id="saveBtn">儲存</button>
    <div class="key-hint">Key 僅存於本機，不上傳任何伺服器。<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">取得 Gemini API Key →</a>
    </div>
    <hr class="s-divider">
    <div class="s-label">AI 模型</div>
    <div class="model-row">
      <button class="model-btn active" data-model="gemini-2.5-flash">
        <span class="model-btn-name">Flash</span>
        <span class="model-btn-desc">快速・免費額度多</span>
      </button>
      <button class="model-btn" data-model="gemini-2.5-pro">
        <span class="model-btn-name">Pro ✦</span>
        <span class="model-btn-desc">更精準・較耗費用</span>
      </button>
    </div>
    <div class="model-hint" id="modelHint">目前：gemini-2.5-flash</div>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📊</div>
    <div class="upload-title">上傳報表截圖</div>
    <div class="upload-sub">建議使用電腦截圖以提高辨識率</div>
    <input type="file" id="fi" accept="image/*">
  </div>
  <img id="previewImg">

  <div id="mainOut"></div>
  <div id="validationBox"></div>
  <button class="debug-btn" id="debugBtn">▶ 顯示 AI 原始資料</button>
  <pre id="debugOut"></pre>

</div>



<script>
var apiKey = '';
var currentModel = 'gemini-2.5-flash';
var players = [];
var myCutPct = 100;
var globalSetPct = 50;
var phase = 'upload';

function fmt(n){
  return Math.abs(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Settings ──────────────────────────────────────────────────
function updateKeyUI(){
  var ok = !!apiKey;
  document.getElementById('keyDot').className = 'key-dot' + (ok ? ' ok' : '');
  document.getElementById('keyStatus').textContent = ok ? 'API Key 已設定' : '未設定 API Key';
}
function saveKey(){
  apiKey = document.getElementById('keyInput').value.trim();
  try{localStorage.setItem('gemini_key', apiKey);}catch(e){}
  updateKeyUI();
}
function openSettings(){
  document.getElementById('settingsPanel').classList.add('show');
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(){
  document.getElementById('settingsPanel').classList.remove('show');
  document.getElementById('settingsOverlay').classList.remove('show');
}
function loadKey(){
  try{apiKey = localStorage.getItem('gemini_key')||'';}catch(e){}
  try{
    var m = localStorage.getItem('gemini_model');
    if(m){
      currentModel = m;
      document.querySelectorAll('.model-btn').forEach(function(b){b.classList.toggle('active', b.dataset.model===currentModel);});
      document.getElementById('modelHint').textContent = '目前：'+currentModel;
    }
  }catch(e){}
  updateKeyUI();
  if(apiKey) document.getElementById('keyInput').value = apiKey;
}

// ── AI ────────────────────────────────────────────────────────
function callAI(b64, mime, promptText){
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+currentModel+':generateContent?key='+apiKey,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:promptText},{inline_data:{mime_type:mime,data:b64}}]}],
      generationConfig:{temperature:0}
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error) throw new Error('API 錯誤: '+data.error.message);
    var txt = data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts[0].text;
    if(!txt) throw new Error('AI 未回傳內容');
    var m = txt.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!m) throw new Error('無法解析格式');
    return JSON.parse(m[0]);
  });
}

// ── Run ───────────────────────────────────────────────────────
function run(e){
  var file = e.target.files[0];
  if(!file) return;
  if(!apiKey){alert('請先在設定⚙️中輸入並儲存 Gemini API Key！');return;}

  document.getElementById('previewImg').src = URL.createObjectURL(file);
  document.getElementById('previewImg').style.display = 'block';
  document.getElementById('validationBox').innerHTML = '';
  document.getElementById('validationBox').style.display = 'none';
  document.getElementById('summaryPanel').style.display = 'none';
  document.getElementById('debugBtn').classList.remove('show');
  document.getElementById('mainOut').innerHTML =
    '<div class="loading">⏳ AI 正在讀取報表數字...<div class="loading-bar"><div class="loading-bar-inner"></div></div></div>';
  document.getElementById('fi').value = '';

  var reader = new FileReader();
  reader.onload = function(ev){
    var b64 = ev.target.result.split(',')[1];
    var prompt = [
      '你是資料抄寫助手，請讀取這張撲克平台報表。',
      '',
      '【欄位說明（由左至右）】',
      '  第1欄: 超代ID（例如 6136-6764）',
      '  第2欄: 超代暱稱（忽略）',
      '  第3欄: 代理ID（忽略）',
      '  第4欄: 代理暱稱（忽略）',
      '  第5欄: 國家/地區（忽略）',
      '  第6欄: Role — Player、Agent 或 Super Agent',
      '  第7欄: 玩家ID',
      '  第8欄: 玩家暱稱',
      '  第9欄: 總輸贏 Total P&L（保留正負號）',
      '  第10欄: Ring Game服務費（取正數，忽略MTT和保險）',
      '',
      '【規則】',
      '- 忽略標題列、TOTAL列、底部額外交收明細',
      '- 同時讀取 TOTAL 合計行 total_pnl（第9欄）和 total_rake（第10欄）',
      '',
      '輸出純 JSON：',
      '{"rows":[{"n":行號,"c1":"超代ID","c6":"Role","c7":"玩家ID","c8":"暱稱","c9":數字,"rake":數字}],"total_pnl":數字,"total_rake":數字}'
    ].join('\n');

    callAI(b64, file.type, prompt)
    .then(function(parsed){
      if(!parsed.rows||!parsed.rows.length) throw new Error('未找到資料');

      document.getElementById('debugOut').textContent = JSON.stringify(parsed,null,2);
      document.getElementById('debugBtn').classList.add('show');

      players = parsed.rows
        .filter(function(r){return r.c7&&r.c7!=='-'&&String(r.c6||'').trim()!=='Super Agent';})
        .map(function(r){
          return{
            id: String(r.c7).trim(),
            nick: String(r.c8||r.c7).trim(),
            rake: Math.abs(parseFloat(r.rake)||0),
            pnl:  parseFloat(r.c9)||0,
            role: String(r.c6||'').trim(),
            pct:  50,
            selected: false
          };
        });

      // Validation (use ALL rows including Super Agent for total comparison)
      var warnings = [];
      if(parsed.total_pnl!==undefined){
        var sP = parsed.rows.reduce(function(s,r){return s+(parseFloat(r.c9)||0);},0);
        var sR = parsed.rows.reduce(function(s,r){return s+(parseFloat(r.rake)||0);},0);
        var dP = Math.abs(sP - parsed.total_pnl);
        var dR = Math.abs(sR - parsed.total_rake);
        warnings.push(dP>1 ? '⚠️ 總輸贏差異 $'+fmt(dP)+' (AI算出 '+fmt(sP)+' vs 報表TOTAL '+fmt(parsed.total_pnl)+')' : '✅ 總輸贏驗證通過 ('+fmt(sP)+')');
        warnings.push(dR>1 ? '⚠️ 服務費差異 $'+fmt(dR)+' (AI算出 '+fmt(sR)+' vs 報表TOTAL '+fmt(parsed.total_rake)+')' : '✅ 服務費驗證通過 ('+fmt(sR)+')');
      }
      showValidation(warnings);
      phase = 'select';
      renderSelect();
    })
    .catch(function(err){
      document.getElementById('mainOut').innerHTML = '<div class="error-box"><b>⚠ 錯誤</b><br>'+esc(err.message)+'</div>';
    });
  };
  reader.readAsDataURL(file);
}

// ── Validation ────────────────────────────────────────────────
function showValidation(msgs){
  var box = document.getElementById('validationBox');
  box.innerHTML = msgs.map(function(m){
    return '<div class="vrow '+(m.indexOf('✅')===0?'vok':'vwarn')+'">'+esc(m)+'</div>';
  }).join('');
  box.style.display = 'block';
}

// ── Phase 1: Select ───────────────────────────────────────────
function renderSelect(){
  var sel = players.filter(function(p){return p.selected;}).length;
  var f = '';
  f += '<div class="phase-hdr"><div class="phase-num">1</div><div class="phase-title">勾選要計算退水的人</div></div>';
  f += '<div class="select-bar">';
  f += '<div class="select-bar-left">';
  f += '<input type="checkbox" class="chk" id="selAll" '+(sel===players.length&&players.length>0?'checked':'')+' data-action="select-all">';
  f += '<label class="select-bar-label" for="selAll">全選</label>';
  f += '</div>';
  f += '<span class="select-count">已選 '+sel+' / '+players.length+' 人</span>';
  f += '</div>';

  players.forEach(function(p,i){
    var pos = p.pnl>=0;
    f += '<div class="pcard'+(p.selected?' sel':'')+'">';
    f += '<div class="prow" data-action="toggle-select" data-idx="'+i+'">';
    f += '<input type="checkbox" class="chk" '+(p.selected?'checked':'')+' data-action="toggle-select" data-idx="'+i+'">';
    f += '<div class="pinfo">';
    f += '<div class="pname">'+esc(p.nick)+(p.role==='Agent'?'<span class="agent-badge">代理</span>':'')+'</div>';
    f += '<div class="pid">'+esc(p.id)+'</div>';
    f += '</div>';
    f += '<div style="text-align:right">';
    f += '<div class="'+(pos?'pnl-pos':'pnl-neg')+'">'+(pos?'+':'-')+'$'+fmt(Math.abs(p.pnl))+'</div>';
    f += '<div class="prake">Rake $'+fmt(p.rake)+'</div>';
    f += '</div>';
    f += '</div></div>';
  });

  f += '<div style="padding:16px 16px 8px;">';
  f += '<button class="cta-btn" data-action="go-calc">計算退水 →</button>';
  f += '</div>';

  document.getElementById('mainOut').innerHTML = f;
  document.getElementById('summaryPanel').style.display = 'none';
  bindEvents();
}

// ── Phase 2: Calc ─────────────────────────────────────────────
function renderCalc(){
  var sel = players.filter(function(p){return p.selected;});
  if(!sel.length){alert('請先勾選至少一位玩家');return;}
  phase = 'calc';

  var f = '';
  f += '<div class="phase-hdr"><div class="phase-num">2</div><div class="phase-title">調整退水比例</div></div>';

  // Global set bar (pct controls here only, not per-player)
  f += '<div class="global-bar">';
  f += '<span class="global-bar-label">一鍵設定全部</span>';
  f += '<div style="display:flex;align-items:center;gap:5px;">';
  f += '<button class="pct-btn" data-action="global-step" data-delta="-5">−</button>';
  f += '<span class="pct-val" id="gPctEl">'+globalSetPct+'%</span>';
  f += '<button class="pct-btn" data-action="global-step" data-delta="5">+</button>';
  f += '</div>';
  f += '<button class="global-apply" data-action="global-apply">套用</button>';
  f += '</div>';

  sel.forEach(function(p){
    var i = players.indexOf(p);
    var pos = p.pnl>=0;
    var rebate = p.rake*p.pct/100;
    var settle = p.pnl+rebate;
    f += '<div class="pcard sel">';
    f += '<div class="prow" style="cursor:default;">';
    f += '<div class="pinfo">';
    f += '<div class="pname">'+esc(p.nick)+(p.role==='Agent'?'<span class="agent-badge">代理</span>':'')+'</div>';
    f += '<div class="pid">'+esc(p.id)+'</div>';
    f += '</div>';
    f += '<div style="text-align:right">';
    f += '<div class="'+(pos?'pnl-pos':'pnl-neg')+'">'+(pos?'+':'-')+'$'+fmt(Math.abs(p.pnl))+'</div>';
    f += '<div class="prake">退水 $<span id="rv'+i+'">'+fmt(rebate)+'</span></div>';
    f += '</div>';
    f += '</div>';
    // Settle row
    f += '<div class="settle-row">';
    f += '<span class="settle-label">Rake $'+fmt(p.rake)+' · '+p.pct+'% · 實際結算</span>';
    f += '<span id="sv'+i+'" class="'+(settle>=0?'settle-pos':'settle-neg')+'">'+(settle>=0?'+':'-')+'$'+fmt(Math.abs(settle))+'</span>';
    f += '</div>';
    f += '</div>';
  });

  f += '<div class="static-summary" id="staticSummary"></div>';
  f += '<div style="padding:4px 16px 16px;">';
  f += '<button class="back-btn" data-action="go-select">← 重新選擇</button>';
  f += '</div>';

  document.getElementById('mainOut').innerHTML = f;
  document.getElementById('summaryPanel').style.display = 'none';
  updateSummaryStatic();
  bindEvents();
}

// ── Summary ───────────────────────────────────────────────────
function calcTotals(){
  var sel = players.filter(function(p){return p.selected;});
  var tPnl    = sel.reduce(function(s,p){return s+p.pnl;},0);
  var tRake   = sel.reduce(function(s,p){return s+p.rake;},0);
  var tRebate = sel.reduce(function(s,p){return s+p.rake*p.pct/100;},0);
  var tSettle = tPnl + tRebate;
  return {count:sel.length, pnl:tPnl, rake:tRake, rebate:tRebate, settle:tSettle};
}

function updateSummary(){
  // for phase 1 select only (floating panel)
  var t = calcTotals();
  var pnlEl = document.getElementById('sumPnl');
  if(pnlEl){
    pnlEl.textContent = (t.pnl>=0?'+':'-')+'$'+fmt(Math.abs(t.pnl));
    pnlEl.style.color = t.pnl>=0 ? 'var(--green)' : 'var(--red)';
  }
  var cEl = document.getElementById('sumCount'); if(cEl) cEl.textContent = t.count+' 人';
  var rEl = document.getElementById('sumRebate'); if(rEl) rEl.textContent = '$'+fmt(t.rebate);
  var mEl = document.getElementById('myCutPctEl'); if(mEl) mEl.textContent = myCutPct+'%';
  var aEl = document.getElementById('myCutAmt'); if(aEl) aEl.textContent = '$'+fmt(t.rebate*myCutPct/100);
}

function updateSummaryStatic(){
  var box = document.getElementById('staticSummary');
  if(!box) return;
  var t = calcTotals();
  var pnlColor = t.pnl>=0 ? 'var(--green)' : 'var(--red)';
  var pnlSign  = t.pnl>=0 ? '+' : '-';
  var myAmt = t.rebate * myCutPct / 100;
  // 需支付 = 總退水 (money agent needs to pay out)
  var html = '<div class="ssum-row"><span class="ssum-label">已選人數</span><span class="ssum-val">'+t.count+' 人</span></div>';
  html += '<div class="ssum-row"><span class="ssum-label">總輸贏</span><span class="ssum-val" style="color:'+pnlColor+'">'+pnlSign+'$'+fmt(Math.abs(t.pnl))+'</span></div>';
  html += '<div class="ssum-row"><span class="ssum-label">總退水</span><span class="ssum-val" style="color:var(--gold2)">$'+fmt(t.rebate)+'</span></div>';
  html += '<div class="ssum-row"><span class="ssum-label">需支付</span><span class="ssum-val" style="color:var(--red)">$'+fmt(t.rebate)+'</span></div>';

  box.innerHTML = html;
}

// ── Events ────────────────────────────────────────────────────
function bindEvents(){
  var out = document.getElementById('mainOut');
  out.onclick = handleMainClick;
}

function handleMainClick(e){
  var node = e.target;
  while(node && node !== document.getElementById('mainOut')){
    var action = node.dataset&&node.dataset.action;
    if(action){
      e.stopPropagation();
      if(action==='toggle-select'){
        var i=parseInt(node.dataset.idx);
        players[i].selected=!players[i].selected;
        renderSelect(); return;
      }
      if(action==='select-all'){
        var allSel=players.every(function(p){return p.selected;});
        players.forEach(function(p){p.selected=!allSel;});
        renderSelect(); return;
      }
      if(action==='go-calc'){renderCalc();return;}
      if(action==='go-select'){phase='select';renderSelect();return;}
      if(action==='pct-step'){
        var i=parseInt(node.dataset.idx);
        var d=parseInt(node.dataset.delta);
        players[i].pct=Math.max(0,Math.min(100,players[i].pct+d));
        var p=players[i];
        var rebate=p.rake*p.pct/100;
        var settle=p.pnl+rebate;
        var ev=document.getElementById('pv'+i);
        var eb=document.getElementById('pb'+i);
        var er=document.getElementById('rv'+i);
        var es=document.getElementById('sv'+i);
        if(ev) ev.textContent=p.pct;
        if(eb) eb.textContent=p.pct+'%';
        if(er) er.textContent='$'+fmt(rebate);
        if(es){
          es.textContent=(settle>=0?'+':'-')+'$'+fmt(Math.abs(settle));
          es.className=settle>=0?'settle-pos':'settle-neg';
        }
        updateSummary(); return;
      }
      if(action==='global-step'){
        var d=parseInt(node.dataset.delta);
        globalSetPct=Math.max(0,Math.min(100,globalSetPct+d));
        var eg=document.getElementById('gPctEl');
        if(eg) eg.textContent=globalSetPct+'%';
        return;
      }
      if(action==='global-apply'){
        players.filter(function(p){return p.selected;}).forEach(function(p){p.pct=globalSetPct;});
        renderCalc(); return;
      }
      if(action==='mycut-static-step'){
        var d=parseInt(node.dataset.delta);
        myCutPct=Math.max(0,Math.min(100,myCutPct+d));
        var sel=players.filter(function(p){return p.selected;});
        var tR=sel.reduce(function(s,p){return s+p.rake*p.pct/100;},0);
        var mEl=document.getElementById('sMyCutPct'); if(mEl) mEl.textContent=myCutPct+'%';
        var aEl=document.getElementById('sMyCutAmt'); if(aEl) aEl.textContent='$'+fmt(tR*myCutPct/100);
        return;
      }
    }
    node=node.parentNode;
  }
}
