<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退傭試算 (最終穩定版)</title>
<style>
  :root { --bg: #0a0a0a; --gold: #c9a84c; --text: #f0f0f0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; max-width: 430px; margin: 0 auto; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
  .btn { background: var(--gold); color: black; padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
<div class="header">
  <b style="color:var(--gold)">♠ 退傭試算 (穩定版)</b>
  <button onclick="setKey()">⚙️</button>
</div>
<button class="btn" onclick="document.getElementById('f').click()">📷 導入圖片開始分析</button>
<input type="file" id="f" hidden accept="image/*" onchange="run(event)">
<div id="out" style="margin-top:20px"></div>

<script>
function setKey() { 
  const k = prompt("請貼上 API Key:", localStorage.getItem('g_key')||""); 
  if(k) { localStorage.setItem('g_key', k.trim()); alert("Key 已儲存！"); }
}

async function run(e) {
  const file = e.target.files[0]; 
  const key = localStorage.getItem('g_key');
  if(!key) { setKey(); return; }
  
  const out = document.getElementById('out');
  out.innerHTML = "正在辨識中...";

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    // 改用權限最寬鬆的 1.5-flash-8b 模型
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;
    
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { text: "提取表格中的玩家ID、暱稱和服務費(Rake)，以 JSON 回傳: {players:[{id,nick,rake}]}" },
            { inline_data: { mime_type: file.type, data: base64 } }
          ]}]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.candidates[0].content.parts[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      const ps = JSON.parse(jsonMatch[0]).players;
      
      let h = '<table style="width:100%; border-collapse:collapse">';
      ps.forEach(p => {
        h += `<tr style="border-bottom:1px solid #222"><td style="padding:10px">${p.nick}<br><small style="color:#555">${p.id}</small></td><td style="text-align:right; color:var(--gold)">$${p.rake}</td></tr>`;
      });
      out.innerHTML = h + '</table>';
    } catch (err) {
      out.innerHTML = "分析失敗：" + err.message + "<br><br>這通常是因為 Google 剛創的金鑰還在同步。請等 5 分鐘再試。";
    }
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
