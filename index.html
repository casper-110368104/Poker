<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退傭試算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg2: #111;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --text: #f0f0f0;
    --muted: #555;
    --red: #ff4d4d;
    --green: #4dff91;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    max-width: 430px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  .header-title {
    color: var(--gold);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
  }
  .key-status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .key-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .key-dot.active { background: var(--green); }

  /* API Key section */
  .key-section {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .key-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .key-row {
    display: flex;
    gap: 8px;
  }
  .key-input {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .key-input:focus { border-color: var(--gold); }
  .key-save-btn {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--gold);
    padding: 9px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .key-save-btn:hover { background: #2a2a2a; }

  /* Upload button */
  .upload-btn {
    background: linear-gradient(135deg, var(--gold), #a07830);
    color: #000;
    padding: 15px;
    border-radius: 25px;
    border: none;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    font-size: 15px;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .upload-btn:hover { opacity: 0.9; }
  .upload-btn:active { transform: scale(0.98); }
  .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading */
  .loading {
    text-align: center;
    margin-top: 28px;
    color: var(--gold);
    font-size: 14px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Preview */
  .preview-img {
    width: 100%;
    border-radius: 10px;
    margin-top: 16px;
    border: 1px solid #222;
    display: none;
  }

  /* Table */
  .result-table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: var(--bg2);
    border-radius: 12px;
    overflow: hidden;
  }
  .result-table thead tr {
    background: #1a1a1a;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .result-table th { padding: 10px 14px; text-align: left; font-weight: 400; }
  .result-table th:last-child { text-align: right; }
  .result-table td { padding: 13px 14px; border-bottom: 1px solid #1a1a1a; }
  .result-table tr:last-child td { border-bottom: none; }
  .player-nick { font-weight: 700; font-size: 14px; }
  .player-id { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rake-val {
    text-align: right;
    color: var(--gold);
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }

  /* Total row */
  .total-row td {
    background: #161610;
    color: var(--gold2);
    font-weight: 700;
    border-top: 1px solid #333;
  }
  .total-row td:last-child { text-align: right; font-size: 16px; }

  /* Error */
  .error-box {
    background: #1a0a0a;
    border: 1px solid #4a1010;
    border-radius: 10px;
    padding: 14px;
    margin-top: 20px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
  }
  .error-box b { display: block; margin-bottom: 6px; }

  /* Help text */
  .help {
    font-size: 11px;
    color: #333;
    text-align: center;
    margin-top: 14px;
    line-height: 1.6;
  }
  .help a { color: #555; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">♠ 退傭試算</span>
  <div class="key-status">
    <div class="key-dot" id="keyDot"></div>
    <span id="keyStatusText">未設定 Key</span>
  </div>
</div>

<!-- API Key Section -->
<div class="key-section">
  <div class="key-label">GEMINI API KEY</div>
  <div class="key-row">
    <input type="password" class="key-input" id="keyInput" placeholder="AIza...">
    <button class="key-save-btn" onclick="saveKey()">儲存</button>
  </div>
</div>

<!-- Upload -->
<button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
  📷 導入圖片開始分析
</button>
<input type="file" id="fileInput" hidden accept="image/*" onchange="run(event)">

<!-- Preview -->
<img id="previewImg" class="preview-img">

<!-- Output -->
<div id="out"></div>

<!-- Help -->
<div class="help">
  API Key 儲存於瀏覽器本地，不會上傳至任何伺服器<br>
  <a href="https://aistudio.google.com/app/apikey" target="_blank">取得免費 Gemini API Key →</a>
</div>

<script>
  // ── Key 管理 ──────────────────────────────────────────
  let apiKey = '';

  function loadKey() {
    try { apiKey = localStorage.getItem('gemini_key') || ''; } 
    catch(e) { apiKey = ''; }
    updateKeyUI();
    if (apiKey) document.getElementById('keyInput').value = apiKey;
  }

  function saveKey() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val) { alert('請輸入 API Key'); return; }
    apiKey = val;
    try { localStorage.setItem('gemini_key', val); } catch(e) {}
    updateKeyUI();
    alert('✅ 已儲存！');
  }

  function updateKeyUI() {
    const dot = document.getElementById('keyDot');
    const txt = document.getElementById('keyStatusText');
    if (apiKey) {
      dot.classList.add('active');
      txt.textContent = 'Key 已設定';
    } else {
      dot.classList.remove('active');
      txt.textContent = '未設定 Key';
    }
  }

  // ── 分析 ──────────────────────────────────────────────
  async function run(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!apiKey) {
      alert('請先輸入並儲存 Gemini API Key！');
      return;
    }

    // 圖片預覽
    const preview = document.getElementById('previewImg');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';

    const out = document.getElementById('out');
    out.innerHTML = "<div class='loading'>⏳ 正在連線至 Gemini，請稍候...</div>";
    document.getElementById('uploadBtn').disabled = true;

    const reader = new FileReader();
    reader.onload = async (ev) => {
      const base64 = ev.target.result.split(',')[1];
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${apiKey}`;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: `你是資料提取助手。請從圖片中的表格提取所有玩家資料。
只回傳 JSON，不要有其他文字，格式如下：
{"players":[{"id":"玩家ID","nick":"暱稱","rake":"服務費數字"}]}
rake 只填數字，不要有 $ 或逗號。` },
                { inline_data: { mime_type: file.type, data: base64 } }
              ]
            }],
            generationConfig: { temperature: 0.1 }
          })
        });

        const data = await res.json();

        if (data.error) {
          throw new Error(`API 錯誤 ${data.error.code}: ${data.error.message}`);
        }

        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!aiText) throw new Error('AI 未回傳內容，請重試');

        // 解析 JSON（相容有 markdown code block 的情況）
        const cleaned = aiText.replace(/```json|```/g, '').trim();
        const jsonStr = cleaned.match(/\{[\s\S]*\}/)?.[0];
        if (!jsonStr) throw new Error('無法解析 AI 回傳的格式，請重試');

        const ps = JSON.parse(jsonStr).players;
        if (!ps || ps.length === 0) throw new Error('圖片中未找到玩家資料');

        // 計算總計
        const total = ps.reduce((sum, p) => sum + parseFloat(p.rake || 0), 0);

        let h = `<table class="result-table">
          <thead><tr>
            <th>玩家</th>
            <th style="text-align:right">Rake</th>
          </tr></thead><tbody>`;

        ps.forEach(p => {
          const rakeNum = parseFloat(p.rake || 0).toLocaleString('zh-TW', { minimumFractionDigits: 0 });
          h += `<tr>
            <td>
              <div class="player-nick">${escHtml(p.nick || '-')}</div>
              <div class="player-id">${escHtml(p.id || '')}</div>
            </td>
            <td class="rake-val">$${rakeNum}</td>
          </tr>`;
        });

        const totalStr = total.toLocaleString('zh-TW', { minimumFractionDigits: 0 });
        h += `</tbody>
          <tfoot><tr class="total-row">
            <td>合計 ${ps.length} 人</td>
            <td>$${totalStr}</td>
          </tr></tfoot>
        </table>`;

        out.innerHTML = h;

      } catch (err) {
        out.innerHTML = `<div class="error-box">
          <b>⚠ 發生錯誤</b>
          ${escHtml(err.message)}<br><br>
          常見原因：<br>
          • API Key 不正確或已過期<br>
          • 圖片格式不支援（請用 JPG/PNG）<br>
          • 圖片中沒有可識別的表格
        </div>`;
      } finally {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('fileInput').value = '';
      }
    };
    reader.readAsDataURL(file);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 初始化
  loadKey();
</script>
</body>
</html>
```
