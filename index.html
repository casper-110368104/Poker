<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退水試算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#0a0a0a;--bg2:#111;--gold:#c9a84c;--gold2:#f0d080;--text:#f0f0f0;--muted:#555;--red:#ff4d4d;--green:#4dff91;--border:#222;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;max-width:520px;margin:0 auto;padding:16px;min-height:100vh;}

  .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a2a;padding-bottom:12px;margin-bottom:16px;}
  .header-title{color:var(--gold);font-weight:700;font-size:15px;letter-spacing:1px;}
  .key-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .key-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s;}
  .key-dot.active{background:var(--green);}

  .card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px;}
  .card-label{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
  .key-row{display:flex;gap:8px;}
  .key-input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;font-family:monospace;outline:none;transition:border-color .2s;}
  .key-input:focus{border-color:var(--gold);}
  .save-btn{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:var(--gold);padding:9px 14px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
  .save-btn:hover{background:#2a2a2a;}
  .key-hint{font-size:10px;color:#333;margin-top:6px;}
  .key-hint a{color:#444;}

  .upload-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:#000;padding:15px;border-radius:25px;border:none;font-weight:700;width:100%;cursor:pointer;font-size:15px;letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
  .upload-btn:hover{opacity:.9;}
  .upload-btn:disabled{opacity:.4;cursor:not-allowed;}

  .loading{text-align:center;margin-top:24px;color:var(--gold);font-size:14px;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .preview-img{width:100%;border-radius:10px;margin-top:12px;border:1px solid #222;display:none;}

  /* ── 預覽分組 ── */
  .step-title{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;margin:20px 0 8px;}
  .step-hint{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6;}

  .agent-preview{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .agent-preview-header{background:#1a1a1a;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
  .agent-preview-header:hover{background:#222;}
  .ap-left{display:flex;align-items:center;gap:8px;}
  .ap-name{font-weight:700;font-size:13px;color:var(--gold);}
  .ap-count{font-size:11px;color:var(--muted);}
  .ap-rake{font-size:12px;color:#aaa;}
  .ap-toggle{color:var(--muted);font-size:12px;}
  .ap-body{display:none;border-top:1px solid var(--border);}
  .ap-body.open{display:block;}

  .mini-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #1a1a1a;gap:8px;}
  .mini-row:last-child{border-bottom:none;}
  .mini-nick{flex:1;font-size:12px;font-weight:600;}
  .mini-id{font-size:10px;color:var(--muted);}
  .mini-rake{font-size:12px;color:#aaa;font-variant-numeric:tabular-nums;}

  /* reassign dropdown */
  .reassign-wrap{position:relative;}
  .reassign-btn{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:var(--muted);padding:3px 7px;font-size:10px;cursor:pointer;}
  .reassign-btn:hover{color:var(--text);}
  .reassign-dropdown{display:none;position:absolute;right:0;top:22px;background:#1e1e1e;border:1px solid #333;border-radius:8px;z-index:99;min-width:130px;box-shadow:0 4px 12px rgba(0,0,0,.5);}
  .reassign-dropdown.open{display:block;}
  .reassign-option{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text);}
  .reassign-option:hover{background:#2a2a2a;}
  .reassign-option.current{color:var(--gold);}

  .confirm-btn{background:linear-gradient(135deg,#1a3a1a,#0a2a0a);color:var(--green);padding:13px;border-radius:25px;border:1px solid #2a5a2a;font-weight:700;width:100%;cursor:pointer;font-size:14px;font-family:'Noto Sans TC',sans-serif;margin-top:4px;transition:opacity .2s;}
  .confirm-btn:hover{opacity:.9;}

  /* ── 退水結果 ── */
  .agent-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-top:14px;overflow:hidden;}
  .agent-header{background:#1a1a1a;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;}
  .agent-name{font-weight:700;font-size:14px;color:var(--gold);}
  .agent-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .agent-rebate-total{font-size:13px;color:var(--gold2);font-weight:700;text-align:right;}
  .agent-rebate-label{font-size:10px;color:var(--muted);text-align:right;}

  .player-row{border-bottom:1px solid #1a1a1a;padding:10px 14px;display:flex;align-items:center;gap:10px;}
  .player-row:last-child{border-bottom:none;}
  .player-info{flex:1;min-width:0;}
  .p-nick{font-weight:700;font-size:13px;}
  .p-id{font-size:11px;color:var(--muted);margin-top:1px;}
  .p-rake{font-size:12px;color:#666;margin-top:2px;}
  .pct-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .pct-input{width:52px;background:#0d0d0d;border:1px solid #333;border-radius:6px;color:var(--gold2);padding:5px 6px;font-size:13px;font-weight:700;text-align:center;outline:none;}
  .pct-input:focus{border-color:var(--gold);}
  .pct-sign{font-size:12px;color:var(--muted);}
  .rebate-amt{min-width:72px;text-align:right;color:var(--gold);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;}

  .grand-total{background:#161610;border:1px solid #333;border-radius:12px;margin-top:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
  .gt-label{font-size:13px;color:var(--muted);}
  .gt-val{font-size:20px;font-weight:700;color:var(--gold2);}

  .back-btn{background:#1a1a1a;color:var(--muted);padding:10px;border-radius:20px;border:1px solid #333;font-size:12px;width:100%;cursor:pointer;margin-top:12px;font-family:'Noto Sans TC',sans-serif;}
  .back-btn:hover{color:var(--text);}

  .error-box{background:#1a0a0a;border:1px solid #4a1010;border-radius:10px;padding:14px;margin-top:16px;color:var(--red);font-size:13px;line-height:1.7;}
  .error-box b{display:block;margin-bottom:6px;}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">♠ 退水試算系統</span>
  <div class="key-status">
    <div class="key-dot" id="keyDot"></div>
    <span id="keyStatusText">未設定 Key</span>
  </div>
</div>

<div class="card">
  <div class="card-label">GEMINI API KEY</div>
  <div class="key-row">
    <input type="password" class="key-input" id="keyInput" placeholder="AIza...">
    <button class="save-btn" onclick="saveKey()">儲存</button>
  </div>
  <div class="key-hint">Key 僅存於本機瀏覽器，不會上傳至任何伺服器。<br>
    <a href="https://aistudio.google.com/app/apikey" target="_blank">取得 Gemini API Key →</a>
  </div>
</div>

<button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
  📷 導入報表圖片開始分析
</button>
<input type="file" id="fileInput" hidden accept="image/*" onchange="run(event)">
<img id="previewImg" class="preview-img">
<div id="out"></div>

<script>
let apiKey = '';
let grouped = {}; // { agentId: { nick, selfRake, players:[{id,nick,rake,pct}] } }
let openDropdown = null;

function loadKey() {
  try { apiKey = localStorage.getItem('gemini_key') || ''; } catch(e) { apiKey=''; }
  updateKeyUI();
  if (apiKey) document.getElementById('keyInput').value = apiKey;
}
function saveKey() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val) { alert('請輸入 API Key'); return; }
  apiKey = val;
  try { localStorage.setItem('gemini_key', val); } catch(e) {}
  updateKeyUI(); alert('✅ 已儲存！');
}
function updateKeyUI() {
  const dot = document.getElementById('keyDot');
  const txt = document.getElementById('keyStatusText');
  if (apiKey) { dot.classList.add('active'); txt.textContent = 'Key 已設定'; }
  else { dot.classList.remove('active'); txt.textContent = '未設定 Key'; }
}

async function run(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!apiKey) { alert('請先輸入並儲存 Gemini API Key！'); return; }

  const preview = document.getElementById('previewImg');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';

  const out = document.getElementById('out');
  out.innerHTML = "<div class='loading'>⏳ 正在分析代理層級，請稍候...</div>";
  document.getElementById('uploadBtn').disabled = true;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { text: `你是專業資料提取助手。這是撲克平台代理報表圖片。

表格通常包含以下欄位（由左至右）：
超級代理ID、代理ID(Agent ID)、玩家ID(Player ID)、暱稱(Nickname)、玩家類型(Player/Agent)、服務費(Rake/Total Rake 等)

重要規則：
1. 「代理ID」是這個人的直屬上線代理
2. 如果某人的「玩家類型」是 Agent，他本身也是代理
3. 請根據「代理ID」欄位，自動將每個人歸屬到他的直屬代理下
4. 服務費取絕對值（去掉負號）
5. 忽略空白列和 TOTAL 列

請輸出純 JSON，格式如下（不要 markdown）：
{
  "agents": [
    {
      "agentId": "代理的玩家ID",
      "agentNick": "代理暱稱",
      "selfRake": 代理自己的服務費數字,
      "players": [
        {"id": "玩家ID", "nick": "暱稱", "rake": 服務費數字}
      ]
    }
  ]
}

注意：若某人同時是代理也是某代理的玩家，請將他列為獨立的 agent 項目，而非放入 players 裡。` },
            { inline_data: { mime_type: file.type, data: base64 } }
          ]}],
          generationConfig: { temperature: 0.1 }
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(`API 錯誤 ${data.error.code}: ${data.error.message}`);

      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!aiText) throw new Error('AI 未回傳內容，請重試');

      const cleaned = aiText.replace(/```json|```/g,'').trim();
      const jsonStr = cleaned.match(/\{[\s\S]*\}/)?.[0];
      if (!jsonStr) throw new Error('無法解析回傳格式');

      const parsed = JSON.parse(jsonStr);
      if (!parsed.agents?.length) throw new Error('未找到代理資料');

      // 整理成 grouped
      grouped = {};
      parsed.agents.forEach(a => {
        grouped[a.agentId] = {
          nick: a.agentNick || a.agentId,
          selfRake: parseFloat(a.selfRake)||0,
          players: (a.players||[]).map(p => ({...p, rake: parseFloat(p.rake)||0, pct: 30}))
        };
      });

      renderPreview();

    } catch (err) {
      out.innerHTML = `<div class="error-box"><b>⚠ 發生錯誤</b><br>${escHtml(err.message)}</div>`;
    } finally {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('fileInput').value = '';
    }
  };
  reader.readAsDataURL(file);
}

// ── 預覽分組，可調整 ─────────────────────────────────
function renderPreview() {
  const agentIds = Object.keys(grouped);
  let html = `
    <div class="step-title">✅ AI 自動分組完成 — 請確認</div>
    <div class="step-hint">AI 已根據代理欄位自動分組。如有錯誤，可點「移至」調整玩家所屬代理。</div>`;

  agentIds.forEach((aid, ai) => {
    const d = grouped[aid];
    const totalRake = d.players.reduce((s,p) => s+p.rake, 0);
    html += `
    <div class="agent-preview">
      <div class="agent-preview-header" onclick="toggleBody('body_${safe(aid)}')">
        <div class="ap-left">
          <span class="ap-name">代理：${escHtml(d.nick)}</span>
          <span class="ap-count">${d.players.length} 位線下</span>
        </div>
        <div style="text-align:right">
          <div class="ap-rake">線下 Rake $${fmt(totalRake)}</div>
          <div class="ap-toggle" id="tog_${safe(aid)}">▼</div>
        </div>
      </div>
      <div class="ap-body open" id="body_${safe(aid)}">`;

    // 代理自己那行
    html += `<div class="mini-row" style="background:#1a1500">
      <div style="flex:1">
        <div class="mini-nick" style="color:var(--gold)">👑 ${escHtml(d.nick)} <span style="font-size:10px;color:var(--muted)">(代理本人)</span></div>
        <div class="mini-id">${escHtml(aid)}</div>
      </div>
      <div class="mini-rake">$${fmt(d.selfRake)}</div>
    </div>`;

    if (d.players.length === 0) {
      html += `<div style="padding:10px 14px;font-size:11px;color:var(--muted)">無線下玩家</div>`;
    }

    d.players.forEach((p, pi) => {
      html += `<div class="mini-row" id="prow_${safe(aid)}_${pi}">
        <div style="flex:1">
          <div class="mini-nick">${escHtml(p.nick||'-')}</div>
          <div class="mini-id">${escHtml(p.id||'')}</div>
        </div>
        <div class="mini-rake">$${fmt(p.rake)}</div>
        <div class="reassign-wrap">
          <button class="reassign-btn" onclick="toggleDropdown(event,'dd_${safe(aid)}_${pi}')">移至 ▾</button>
          <div class="reassign-dropdown" id="dd_${safe(aid)}_${pi}">
            ${agentIds.map(oid => `
              <div class="reassign-option ${oid===aid?'current':''}"
                onclick="movePlayer('${escAttr(aid)}',${pi},'${escAttr(oid)}')">
                ${oid===aid?'✓ ':''} ${escHtml(grouped[oid].nick)}
              </div>`).join('')}
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `<button class="confirm-btn" onclick="confirmAndCalc()">✅ 確認分組，開始計算退水</button>`;
  document.getElementById('out').innerHTML = html;

  // close dropdown on outside click
  document.addEventListener('click', closeAllDropdowns);
}

function toggleBody(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
}

function toggleDropdown(e, id) {
  e.stopPropagation();
  closeAllDropdowns();
  const dd = document.getElementById(id);
  if (dd) { dd.classList.add('open'); openDropdown = id; }
}
function closeAllDropdowns() {
  document.querySelectorAll('.reassign-dropdown.open').forEach(d => d.classList.remove('open'));
  openDropdown = null;
}

function movePlayer(fromAgent, playerIdx, toAgent) {
  if (fromAgent === toAgent) { closeAllDropdowns(); return; }
  const player = grouped[fromAgent].players.splice(playerIdx, 1)[0];
  grouped[toAgent].players.push(player);
  closeAllDropdowns();
  renderPreview();
}

// ── 確認並計算 ───────────────────────────────────────
function confirmAndCalc() {
  document.removeEventListener('click', closeAllDropdowns);
  renderResults();
}

function renderResults() {
  let html = '';

  Object.entries(grouped).forEach(([agentId, d]) => {
    const safeAgent = safe(agentId);
    const agentRebate = d.players.reduce((s,p) =>
      s + p.rake * (parseFloat(p.pct)||0) / 100, 0);

    html += `<div class="agent-block">
      <div class="agent-header">
        <div>
          <div class="agent-name">代理：${escHtml(d.nick)}</div>
          <div class="agent-sub">
            自身 Rake $${fmt(d.selfRake)} ／ 線下 ${d.players.length} 人
          </div>
        </div>
        <div>
          <div class="agent-rebate-label">線下退水小計</div>
          <div class="agent-rebate-total" id="agt_${safeAgent}">$${fmt(agentRebate)}</div>
        </div>
      </div>`;

    if (d.players.length === 0) {
      html += `<div style="padding:12px 14px;font-size:12px;color:var(--muted)">無線下玩家</div>`;
    }

    d.players.forEach((p, idx) => {
      const rebate = p.rake * (parseFloat(p.pct)||0) / 100;
      const safeP = safe(agentId + '_' + idx);
      html += `<div class="player-row">
        <div class="player-info">
          <div class="p-nick">${escHtml(p.nick||'-')}</div>
          <div class="p-id">${escHtml(p.id||'')}</div>
          <div class="p-rake">Rake $${fmt(p.rake)}</div>
        </div>
        <div class="pct-wrap">
          <input class="pct-input" type="number" min="0" max="100" step="0.1"
            value="${p.pct}"
            oninput="updatePlayer('${escAttr(agentId)}',${idx},this.value)">
          <span class="pct-sign">%</span>
        </div>
        <div class="rebate-amt" id="pamt_${safeP}">$${fmt(rebate)}</div>
      </div>`;
    });

    html += `</div>`;
  });

  const grand = Object.values(grouped).reduce((s,d) =>
    s + d.players.reduce((ss,p) => ss + p.rake*(parseFloat(p.pct)||0)/100, 0), 0);

  html += `<div class="grand-total">
    <span class="gt-label">💰 全部退水總計</span>
    <span class="gt-val" id="grandTotal">$${fmt(grand)}</span>
  </div>
  <button class="back-btn" onclick="renderPreview()">← 返回調整分組</button>`;

  document.getElementById('out').innerHTML = html;
}

function updatePlayer(agentId, idx, val) {
  if (!grouped[agentId]) return;
  grouped[agentId].players[idx].pct = parseFloat(val)||0;
  const p = grouped[agentId].players[idx];
  const rebate = p.rake * p.pct / 100;

  const safeP = safe(agentId + '_' + idx);
  const el = document.getElementById('pamt_' + safeP);
  if (el) el.textContent = `$${fmt(rebate)}`;

  const agentRebate = grouped[agentId].players.reduce((s,pp) =>
    s + pp.rake*(parseFloat(pp.pct)||0)/100, 0);
  const agtEl = document.getElementById('agt_' + safe(agentId));
  if (agtEl) agtEl.textContent = `$${fmt(agentRebate)}`;

  const grand = Object.values(grouped).reduce((s,d) =>
    s + d.players.reduce((ss,pp) => ss+pp.rake*(parseFloat(pp.pct)||0)/100, 0), 0);
  const gtEl = document.getElementById('grandTotal');
  if (gtEl) gtEl.textContent = `$${fmt(grand)}`;
}

function fmt(n){return parseFloat(n).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/'/g,"\\'");}
function safe(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_');}

loadKey();
</script>
</body>
</html>
