<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退水試算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#0a0a0a;--bg2:#111;--gold:#c9a84c;--gold2:#f0d080;--text:#f0f0f0;--muted:#555;--red:#ff4d4d;--green:#4dff91;--border:#222;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;max-width:520px;margin:0 auto;padding:16px;min-height:100vh;}

  .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a2a;padding-bottom:12px;margin-bottom:16px;}
  .header-title{color:var(--gold);font-weight:700;font-size:15px;letter-spacing:1px;}
  .key-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .key-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s;}
  .key-dot.active{background:var(--green);}

  .card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px;}
  .card-label{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
  .key-row{display:flex;gap:8px;}
  .key-input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;font-family:monospace;outline:none;transition:border-color .2s;}
  .key-input:focus{border-color:var(--gold);}
  .save-btn{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:var(--gold);padding:9px 14px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
  .save-btn:hover{background:#2a2a2a;}
  .key-hint{font-size:10px;color:#333;margin-top:6px;}
  .key-hint a{color:#444;}

  .upload-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:#000;padding:15px;border-radius:25px;border:none;font-weight:700;width:100%;cursor:pointer;font-size:15px;letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
  .upload-btn:hover{opacity:.9;}
  .upload-btn:disabled{opacity:.4;cursor:not-allowed;}

  .loading{text-align:center;margin-top:24px;color:var(--gold);font-size:14px;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .preview-img{width:100%;border-radius:10px;margin-top:12px;border:1px solid #222;display:none;}

  /* ── 代理區塊 ── */
  .agent-block{background:var(--bg2);border:2px solid var(--border);border-radius:12px;margin-top:14px;overflow:visible;transition:border-color .2s;}
  .agent-block.drag-over{border-color:var(--gold);background:#151200;}

  .agent-header{background:#1a1a1a;padding:11px 14px;border-radius:10px 10px 0 0;}
  .agent-header-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .agent-name{font-weight:700;font-size:14px;color:var(--gold);}
  .agent-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .agent-totals{text-align:right;}
  .agent-self-rake{font-size:11px;color:var(--muted);}
  .agent-rebate-total{font-size:14px;color:var(--gold2);font-weight:700;}

  .drop-hint{font-size:10px;color:#333;text-align:center;padding:6px;display:none;}
  .agent-block.drag-over .drop-hint{display:block;color:var(--gold);}

  /* ── 玩家列（可拖曳）── */
  .player-row{border-bottom:1px solid #1a1a1a;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:grab;transition:background .15s,opacity .15s;}
  .player-row:last-child{border-bottom:none;}
  .player-row:hover{background:#161616;}
  .player-row.dragging{opacity:.3;cursor:grabbing;}
  .player-row.drag-placeholder{border:2px dashed #333;border-radius:8px;height:52px;background:transparent;margin:4px 8px;}

  .drag-handle{color:#333;font-size:14px;flex-shrink:0;cursor:grab;padding:0 2px;}
  .drag-handle:hover{color:#555;}

  .player-info{flex:1;min-width:0;}
  .p-nick{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p-id{font-size:11px;color:var(--muted);margin-top:1px;}
  .p-rake{font-size:12px;color:#666;margin-top:2px;}

  .pct-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .pct-input{width:52px;background:#0d0d0d;border:1px solid #333;border-radius:6px;color:var(--gold2);padding:5px 6px;font-size:13px;font-weight:700;text-align:center;outline:none;}
  .pct-input:focus{border-color:var(--gold);}
  .pct-sign{font-size:12px;color:var(--muted);}
  .rebate-amt{min-width:72px;text-align:right;color:var(--gold);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;}

  .no-players{padding:12px 14px;font-size:12px;color:var(--muted);font-style:italic;}

  /* 超代說明 */
  .super-agent-note{font-size:11px;color:#333;background:#0d0d0d;border:1px dashed #222;border-radius:8px;padding:8px 12px;margin-top:14px;text-align:center;}

  .grand-total{background:#161610;border:1px solid #333;border-radius:12px;margin-top:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
  .gt-label{font-size:13px;color:var(--muted);}
  .gt-val{font-size:20px;font-weight:700;color:var(--gold2);}

  .error-box{background:#1a0a0a;border:1px solid #4a1010;border-radius:10px;padding:14px;margin-top:16px;color:var(--red);font-size:13px;line-height:1.7;}
  .error-box b{display:block;margin-bottom:6px;}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">♠ 退水試算系統</span>
  <div class="key-status">
    <div class="key-dot" id="keyDot"></div>
    <span id="keyStatusText">未設定 Key</span>
  </div>
</div>

<div class="card">
  <div class="card-label">GEMINI API KEY</div>
  <div class="key-row">
    <input type="password" class="key-input" id="keyInput" placeholder="AIza...">
    <button class="save-btn" onclick="saveKey()">儲存</button>
  </div>
  <div class="key-hint">Key 僅存於本機瀏覽器，不會上傳至任何伺服器。<br>
    <a href="https://aistudio.google.com/app/apikey" target="_blank">取得 Gemini API Key →</a>
  </div>
</div>

<button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
  📷 導入報表圖片開始分析
</button>
<input type="file" id="fileInput" hidden accept="image/*" onchange="run(event)">
<img id="previewImg" class="preview-img">
<div id="out"></div>

<script>
let apiKey = '';
let grouped = {};
// { agentId: { nick, selfRake, players:[{id,nick,rake,pct}] } }

let dragState = null;
// { agentId, playerIdx, el }

// ── Key 管理 ─────────────────────────────────────────
function loadKey() {
  try { apiKey = localStorage.getItem('gemini_key') || ''; } catch(e) { apiKey=''; }
  updateKeyUI();
  if (apiKey) document.getElementById('keyInput').value = apiKey;
}
function saveKey() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val) { alert('請輸入 API Key'); return; }
  apiKey = val;
  try { localStorage.setItem('gemini_key', val); } catch(e) {}
  updateKeyUI(); alert('✅ 已儲存！');
}
function updateKeyUI() {
  const dot = document.getElementById('keyDot');
  const txt = document.getElementById('keyStatusText');
  if (apiKey) { dot.classList.add('active'); txt.textContent = 'Key 已設定'; }
  else { dot.classList.remove('active'); txt.textContent = '未設定 Key'; }
}

// ── 分析圖片 ─────────────────────────────────────────
async function run(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!apiKey) { alert('請先輸入並儲存 Gemini API Key！'); return; }

  const preview = document.getElementById('previewImg');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';

  const out = document.getElementById('out');
  out.innerHTML = "<div class='loading'>⏳ 正在逐行分析報表，請稍候...</div>";
  document.getElementById('uploadBtn').disabled = true;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { text: `你是專業資料提取助手。請仔細逐行讀取這張撲克平台報表圖片，不能漏掉任何一行。

表格欄位（由左至右）：
1. 超級代理ID（忽略）
2. 代理ID（Agent ID）— 這個人的直屬上線代理，可能是空白
3. 玩家ID（Player ID）— 這個人自己的ID
4. 暱稱（Nickname）
5. 玩家類型（Player 或 Agent）
6. 服務費 Rake（取絕對值，去掉負號）

分組規則：
- 代理ID有值 → 這個人屬於那個代理ID底下
- 代理ID是空白 → 這個人是頂層代理（直屬超代）
- 玩家類型是 Agent → 他本身是代理，selfRake 填他自己的服務費
- 忽略 TOTAL 列和完全空白列

輸出純 JSON（不要 markdown）格式：
{
  "rows": [
    {
      "agentId": "直屬代理ID，空白填null",
      "playerId": "此人自己的ID",
      "nick": "暱稱",
      "type": "Player或Agent",
      "rake": 服務費正數
    }
  ]
}` },
            { inline_data: { mime_type: file.type, data: base64 } }
          ]}],
          generationConfig: { temperature: 0 }
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(`API 錯誤 ${data.error.code}: ${data.error.message}`);

      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!aiText) throw new Error('AI 未回傳內容，請重試');

      const cleaned = aiText.replace(/```json|```/g,'').trim();
      const jsonStr = cleaned.match(/\{[\s\S]*\}/)?.[0];
      if (!jsonStr) throw new Error('無法解析回傳格式');

      const parsed = JSON.parse(jsonStr);
      if (!parsed.rows?.length) throw new Error('未找到任何資料');

      grouped = buildGroups(parsed.rows);
      renderAll();

    } catch (err) {
      out.innerHTML = `<div class="error-box"><b>⚠ 發生錯誤</b><br>${escHtml(err.message)}</div>`;
    } finally {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('fileInput').value = '';
    }
  };
  reader.readAsDataURL(file);
}

// ── 建立分組 ─────────────────────────────────────────
function buildGroups(rows) {
  const result = {};

  // 先建立所有代理
  rows.forEach(r => {
    const isTopAgent = !r.agentId || r.agentId === 'null' || r.agentId === null;
    const isAgent = r.type === 'Agent' || isTopAgent;
    if (isAgent && r.playerId) {
      if (!result[r.playerId]) {
        result[r.playerId] = { nick: r.nick || r.playerId, selfRake: parseFloat(r.rake)||0, players: [] };
      } else {
        result[r.playerId].selfRake = parseFloat(r.rake)||0;
        result[r.playerId].nick = r.nick || r.playerId;
      }
    }
  });

  // 再把 Player 分配給對應代理
  rows.forEach(r => {
    if (r.type === 'Agent') return;
    const isTopAgent = !r.agentId || r.agentId === 'null' || r.agentId === null;
    if (isTopAgent) return;
    if (!r.playerId) return;

    if (!result[r.agentId]) {
      result[r.agentId] = { nick: r.agentId, selfRake: 0, players: [] };
    }
    const dup = result[r.agentId].players.some(p => p.id === r.playerId);
    if (!dup) {
      result[r.agentId].players.push({ id: r.playerId, nick: r.nick||r.playerId, rake: parseFloat(r.rake)||0, pct: 30 });
    }
  });

  return result;
}

// ── 渲染所有代理+玩家（含退水輸入）────────────────────
function renderAll() {
  const out = document.getElementById('out');
  let html = `<div class="super-agent-note">💡 拖曳玩家列可移至其他代理　｜　輸入 % 即時計算退水</div>`;

  Object.entries(grouped).forEach(([agentId, d]) => {
    const safeA = safe(agentId);
    const agentRebate = calcAgentRebate(d);

    html += `
    <div class="agent-block" id="ab_${safeA}"
      ondragover="onDragOver(event,'${escAttr(agentId)}')"
      ondragleave="onDragLeave(event,'${escAttr(agentId)}')"
      ondrop="onDrop(event,'${escAttr(agentId)}')">

      <div class="agent-header">
        <div class="agent-header-top">
          <div>
            <div class="agent-name">代理：${escHtml(d.nick)}</div>
            <div class="agent-sub">${escHtml(agentId)} ／ 線下 <span id="cnt_${safeA}">${d.players.length}</span> 人</div>
          </div>
          <div class="agent-totals">
            <div class="agent-self-rake">自身 Rake $${fmt(d.selfRake)}</div>
            <div class="agent-rebate-total">退水小計 $<span id="agt_${safeA}">${fmt(agentRebate)}</span></div>
          </div>
        </div>
      </div>

      <div class="drop-hint">📥 放開以移入此代理</div>

      <div id="players_${safeA}">`;

    if (d.players.length === 0) {
      html += `<div class="no-players" id="nop_${safeA}">尚無線下玩家</div>`;
    }

    d.players.forEach((p, idx) => {
      html += playerRowHTML(agentId, idx, p);
    });

    html += `</div></div>`;
  });

  // Grand total
  const grand = calcGrand();
  html += `<div class="grand-total">
    <span class="gt-label">💰 全部退水總計</span>
    <span class="gt-val">$<span id="grandTotal">${fmt(grand)}</span></span>
  </div>`;

  out.innerHTML = html;
  bindDragEvents();
}

function playerRowHTML(agentId, idx, p) {
  const safeA = safe(agentId);
  const safeP = safe(agentId+'_'+idx);
  const rebate = p.rake * (parseFloat(p.pct)||0) / 100;
  return `<div class="player-row" id="pr_${safeP}"
    draggable="true"
    data-agent="${escAttr(agentId)}"
    data-idx="${idx}"
    ondragstart="onDragStart(event,'${escAttr(agentId)}',${idx})">
    <span class="drag-handle">⠿</span>
    <div class="player-info">
      <div class="p-nick">${escHtml(p.nick||'-')}</div>
      <div class="p-id">${escHtml(p.id||'')}</div>
      <div class="p-rake">Rake $${fmt(p.rake)}</div>
    </div>
    <div class="pct-wrap">
      <input class="pct-input" type="number" min="0" max="100" step="0.1"
        value="${p.pct}"
        oninput="updatePct('${escAttr(agentId)}',${idx},this.value)">
      <span class="pct-sign">%</span>
    </div>
    <div class="rebate-amt" id="pamt_${safeP}">$${fmt(rebate)}</div>
  </div>`;
}

// ── 拖曳邏輯 ─────────────────────────────────────────
function bindDragEvents() {
  // already using inline handlers
}

function onDragStart(e, agentId, idx) {
  dragState = { agentId, idx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', agentId+'|'+idx);
  setTimeout(() => {
    const safeP = safe(agentId+'_'+idx);
    const el = document.getElementById('pr_'+safeP);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragOver(e, agentId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.getElementById('ab_'+safe(agentId));
  if (el) el.classList.add('drag-over');
}

function onDragLeave(e, agentId) {
  // only remove if leaving the block entirely
  const el = document.getElementById('ab_'+safe(agentId));
  if (el && !el.contains(e.relatedTarget)) el.classList.remove('drag-over');
}

function onDrop(e, toAgentId) {
  e.preventDefault();
  const el = document.getElementById('ab_'+safe(toAgentId));
  if (el) el.classList.remove('drag-over');

  if (!dragState) return;
  const { agentId: fromAgentId, idx } = dragState;
  dragState = null;

  if (fromAgentId === toAgentId) return;
  if (!grouped[fromAgentId] || !grouped[toAgentId]) return;

  // Move player
  const [player] = grouped[fromAgentId].players.splice(idx, 1);
  grouped[toAgentId].players.push(player);

  renderAll();
}

// ── 退水計算 ─────────────────────────────────────────
function updatePct(agentId, idx, val) {
  if (!grouped[agentId]?.players[idx]) return;
  grouped[agentId].players[idx].pct = parseFloat(val)||0;
  const p = grouped[agentId].players[idx];
  const rebate = p.rake * p.pct / 100;

  const safeP = safe(agentId+'_'+idx);
  const el = document.getElementById('pamt_'+safeP);
  if (el) el.textContent = `$${fmt(rebate)}`;

  const safeA = safe(agentId);
  const agtEl = document.getElementById('agt_'+safeA);
  if (agtEl) agtEl.textContent = fmt(calcAgentRebate(grouped[agentId]));

  const gtEl = document.getElementById('grandTotal');
  if (gtEl) gtEl.textContent = fmt(calcGrand());
}

function calcAgentRebate(d) {
  return d.players.reduce((s,p) => s+p.rake*(parseFloat(p.pct)||0)/100, 0);
}
function calcGrand() {
  return Object.values(grouped).reduce((s,d) => s+calcAgentRebate(d), 0);
}

function fmt(n){return parseFloat(n).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/'/g,"\\'");}
function safe(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_');}

loadKey();
</script>
</body>
</html>
