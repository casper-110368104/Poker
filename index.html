<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退水試算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#0a0a0a;--bg2:#111;--gold:#c9a84c;--gold2:#f0d080;--text:#f0f0f0;--muted:#555;--red:#ff4d4d;--green:#4dff91;--border:#222;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;max-width:520px;margin:0 auto;padding:16px 14px 40px;min-height:100vh;}

  .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a2a;padding-bottom:12px;margin-bottom:16px;}
  .header-title{color:var(--gold);font-weight:700;font-size:15px;letter-spacing:1px;}
  .key-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .key-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s;}
  .key-dot.active{background:var(--green);}

  .card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px;}
  .card-label{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
  .key-row{display:flex;gap:8px;}
  .key-input{flex:1;background:#0d0d0d;border:1px solid #333;border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;font-family:monospace;outline:none;}
  .key-input:focus{border-color:var(--gold);}
  .save-btn{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:var(--gold);padding:9px 14px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;}
  .save-btn:hover{background:#2a2a2a;}
  .key-hint{font-size:10px;color:#333;margin-top:6px;}
  .key-hint a{color:#444;}

  .upload-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:#000;padding:15px;border-radius:25px;border:none;font-weight:700;width:100%;cursor:pointer;font-size:15px;letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
  .upload-btn:hover{opacity:.9;}
  .upload-btn:disabled{opacity:.4;cursor:not-allowed;}

  .loading{text-align:center;margin-top:24px;color:var(--gold);font-size:14px;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .preview-img{width:100%;border-radius:10px;margin-top:12px;border:1px solid #222;display:none;}

  /* ── 代理區塊 ── */
  .agent-block{background:var(--bg2);border:2px solid var(--border);border-radius:12px;margin-top:14px;overflow:visible;transition:border-color .15s;}
  .agent-block.drag-over{border-color:var(--gold);background:#151200;}

  .agent-header{background:#1a1a1a;padding:11px 14px;border-radius:10px 10px 0 0;}
  .agent-header-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .agent-name{font-weight:700;font-size:14px;color:var(--gold);}
  .agent-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .agent-totals{text-align:right;}
  .agent-self-rake{font-size:11px;color:var(--muted);}
  .agent-rebate-total{font-size:13px;color:var(--gold2);font-weight:700;margin-top:2px;}

  .drop-hint{font-size:10px;color:#333;text-align:center;padding:5px;display:none;}
  .agent-block.drag-over .drop-hint{display:block;color:var(--gold);}

  /* ── 玩家列 ── */
  .player-row{border-bottom:1px solid #1a1a1a;padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:grab;transition:background .12s,opacity .15s;}
  .player-row:last-child{border-bottom:none;}
  .player-row:hover{background:#161616;}
  .player-row.dragging{opacity:.25;cursor:grabbing;}
  .player-row.is-agent-self{background:#1a1500;}

  .drag-handle{color:#2a2a2a;font-size:14px;flex-shrink:0;cursor:grab;}
  .drag-handle:hover{color:#555;}

  .player-info{flex:1;min-width:0;}
  .p-nick{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p-id{font-size:10px;color:var(--muted);margin-top:1px;}
  .p-rake{font-size:11px;color:#555;margin-top:2px;}

  /* ── % 控制（±5 按鈕）── */
  .pct-ctrl{display:flex;align-items:center;gap:3px;flex-shrink:0;}
  .pct-btn{width:24px;height:28px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
  .pct-btn:hover{background:#2a2a2a;}
  .pct-btn:active{background:#333;}
  .pct-val{width:38px;text-align:center;color:var(--gold2);font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;}

  .rebate-amt{min-width:68px;text-align:right;color:var(--gold);font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;}

  .no-players{padding:12px 14px;font-size:12px;color:#2a2a2a;font-style:italic;}

  /* ── 總覽面板 ── */
  .summary-panel{background:#101008;border:1px solid #2a2a1a;border-radius:14px;margin-top:20px;overflow:hidden;}
  .summary-title{background:#1a1a10;padding:10px 16px;font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;border-bottom:1px solid #2a2a1a;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .summary-cell{padding:13px 16px;border-bottom:1px solid #1a1a10;}
  .summary-cell:nth-child(odd){border-right:1px solid #1a1a10;}
  .summary-cell:last-child,.summary-cell:nth-last-child(2){border-bottom:none;}
  .sc-label{font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
  .sc-val{font-size:17px;font-weight:700;color:var(--gold2);font-variant-numeric:tabular-nums;}
  .sc-val.big{font-size:20px;color:var(--green);}

  .my-cut-row{padding:13px 16px;border-top:1px solid #2a2a1a;display:flex;align-items:center;gap:10px;}
  .my-cut-label{font-size:12px;color:var(--muted);flex:1;}
  .my-cut-ctrl{display:flex;align-items:center;gap:4px;}
  .my-cut-result{font-size:15px;font-weight:700;color:var(--green);min-width:90px;text-align:right;font-variant-numeric:tabular-nums;}

  .error-box{background:#1a0a0a;border:1px solid #4a1010;border-radius:10px;padding:14px;margin-top:16px;color:var(--red);font-size:13px;line-height:1.7;}
  .error-box b{display:block;margin-bottom:6px;}

  /* ── 移至選單 ── */
  .move-wrap{position:relative;flex-shrink:0;}
  .move-btn{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:var(--muted);padding:4px 7px;font-size:10px;cursor:pointer;white-space:nowrap;}
  .move-btn:hover{color:var(--text);border-color:#555;}
  .move-menu{display:none;position:absolute;right:0;top:26px;background:#1e1e1e;border:1px solid #333;border-radius:8px;z-index:50;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.6);max-height:180px;overflow-y:auto;}
  .move-menu.open{display:block;}
  .move-option{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text);border-bottom:1px solid #2a2a2a;}
  .move-option:last-child{border-bottom:none;}
  .move-option:hover{background:#2a2a2a;}
  .move-option.current{color:var(--gold);}

  /* ── 齒輪按鈕 ── */
  .gear-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .2s;}
  .gear-btn:hover{opacity:1;}

  /* ── 設定抽屜 ── */
  .settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;}
  .settings-overlay.open{display:block;}
  .settings-drawer{position:fixed;top:0;right:0;height:100%;width:300px;max-width:90vw;background:#141414;border-left:1px solid #2a2a2a;z-index:101;transform:translateX(100%);transition:transform .25s ease;padding:20px 18px;}
  .settings-drawer.open{transform:translateX(0);}
  .settings-inner{display:flex;flex-direction:column;gap:0;}
  .settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid #2a2a2a;padding-bottom:12px;}
  .settings-title{color:var(--gold);font-weight:700;font-size:15px;letter-spacing:1px;}
  .settings-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;}
  .settings-close:hover{color:var(--text);}

  /* ── 詳細資訊展開 ── */
  .detail-panel{display:none;background:#0d0d08;border-top:1px solid #2a2a1a;padding:10px 14px;font-size:12px;}
  .detail-panel.open{display:block;}
  .detail-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a10;}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{color:var(--muted);}
  .detail-val{font-weight:700;font-variant-numeric:tabular-nums;}
  .detail-val.pos{color:var(--green);}
  .detail-val.neg{color:var(--red);}
  .detail-val.neutral{color:var(--gold2);}

  .agent-header-top{cursor:pointer;}
  .agent-header-top:hover .agent-name{text-decoration:underline;}
  .expand-icon{font-size:10px;color:var(--muted);margin-left:4px;transition:transform .2s;}
  .expand-icon.open{transform:rotate(180deg);}

  .player-row{cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">♠ 退水試算系統</span>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="key-status">
      <div class="key-dot" id="keyDot"></div>
      <span id="keyStatusText">未設定 Key</span>
    </div>
    <button class="gear-btn" onclick="toggleSettings()" title="設定">⚙️</button>
  </div>
</div>

<!-- 設定抽屜 -->
<div class="settings-drawer" id="settingsDrawer">
  <div class="settings-inner">
    <div class="settings-header">
      <span class="settings-title">設定</span>
      <button class="settings-close" onclick="toggleSettings()">✕</button>
    </div>
    <div class="card-label" style="padding:0 0 8px">GEMINI API KEY</div>
    <div class="key-row">
      <input type="password" class="key-input" id="keyInput" placeholder="AIza...">
      <button class="save-btn" onclick="saveKey()">儲存</button>
    </div>
    <div class="key-hint" style="margin-top:8px">Key 僅存於本機瀏覽器，不上傳任何伺服器。<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">取得 Gemini API Key →</a>
    </div>
  </div>
</div>
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>

<button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fi').click()">
  📷 導入報表圖片開始分析
</button>
<input type="file" id="fi" hidden accept="image/*" onchange="run(event)">
<img id="previewImg" class="preview-img">
<div id="out"></div>

<script>
let apiKey = '';
let grouped = {};
// { agentId: { nick, selfRake, selfPct, players:[{id,nick,rake,pct,isSelf}] } }
let myCutPct = 100;
let dragState = null;

// ── Key ──────────────────────────────────────────────
function toggleSettings() {
  const drawer = document.getElementById('settingsDrawer');
  const overlay = document.getElementById('settingsOverlay');
  const isOpen = drawer.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
}

function loadKey() {
  try { apiKey = localStorage.getItem('gemini_key')||''; } catch(e){}
  updateKeyUI();
  if (apiKey) document.getElementById('keyInput').value = apiKey;
}
function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v) { alert('請輸入 API Key'); return; }
  apiKey = v;
  try { localStorage.setItem('gemini_key', v); } catch(e){}
  updateKeyUI(); alert('✅ 已儲存！');
}
function updateKeyUI() {
  const active = !!apiKey;
  document.getElementById('keyDot').classList.toggle('active', active);
  document.getElementById('keyStatusText').textContent = active ? 'Key 已設定' : '未設定 Key';
}

// ── 分析 ─────────────────────────────────────────────
async function run(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!apiKey) { alert('請先設定 Gemini API Key！'); return; }

  const preview = document.getElementById('previewImg');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.getElementById('out').innerHTML = "<div class='loading'>⏳ 正在逐行分析，請稍候...</div>";
  document.getElementById('uploadBtn').disabled = true;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
    try {
      const res = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          contents:[{parts:[
            {text:`你是專業資料提取助手。請仔細逐行讀取這張撲克平台報表圖片，絕對不能漏掉任何一行。

表格欄位（由左至右）：
1. 超級代理ID（Super Agent ID）— 此人的超代
2. 代理ID（Agent ID）— 此人的直屬上線代理，可能空白
3. 玩家ID（Player ID）— 此人自己的ID
4. 暱稱（Nickname）
5. 玩家類型（Player 或 Agent）
6. 服務費 Rake（取絕對值）

規則：
- 代理ID有值 → 此人屬於該代理底下
- 代理ID空白 → 此人直屬超代，superAgentId 填超代ID
- 玩家類型是 Agent → 他本身是代理
- 忽略 TOTAL 列和空白列

輸出純 JSON（不要 markdown）：
{"rows":[{"superAgentId":"超代ID，空白填null","agentId":"直屬代理ID，空白填null","playerId":"自己ID","nick":"暱稱","type":"Player或Agent","rake":服務費正數,"pnl":玩家純輸贏數字（正負完整保留，此欄位名稱通常是 Total P&L、Total Rake Game P&L 或類似含 P&L 字樣的欄位，這是未扣除Rake的原始輸贏，找不到填0）}]}`},
            {inline_data:{mime_type:file.type, data:base64}}
          ]}],
          generationConfig:{temperature:0}
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(`API 錯誤 ${data.error.code}: ${data.error.message}`);
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!aiText) throw new Error('AI 未回傳內容，請重試');

      const cleaned = aiText.replace(/```json|```/g,'').trim();
      const jsonStr = cleaned.match(/\{[\s\S]*\}/)?.[0];
      if (!jsonStr) throw new Error('無法解析回傳格式');

      const parsed = JSON.parse(jsonStr);
      if (!parsed.rows?.length) throw new Error('未找到任何資料');

      grouped = buildGroups(parsed.rows);
      myCutPct = 100;
      renderAll();

    } catch(err) {
      document.getElementById('out').innerHTML = `<div class="error-box"><b>⚠ 發生錯誤</b><br>${escHtml(err.message)}</div>`;
    } finally {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('fi').value = '';
    }
  };
  reader.readAsDataURL(file);
}

// ── 建立分組（代理本人也加入 players）────────────────
function buildGroups(rows) {
  const result = {};

  // 判斷此人的「所屬代理」：agentId有值用agentId，空白用superAgentId
  function getOwner(r) {
    const aid = r.agentId && r.agentId !== 'null' ? r.agentId : null;
    const sid = r.superAgentId && r.superAgentId !== 'null' ? r.superAgentId : null;
    return aid || sid || null;
  }

  // Step 1: 建立代理（type=Agent 或找不到 owner 的人）
  rows.forEach(r => {
    if (!r.playerId) return;
    const owner = getOwner(r);
    const isAgent = r.type === 'Agent' || !owner;
    if (isAgent) {
      if (!result[r.playerId]) {
        result[r.playerId] = { nick: r.nick||r.playerId, selfRake: parseFloat(r.rake)||0, selfPnl: parseFloat(r.pnl)||0, players:[] };
      } else {
        result[r.playerId].nick = r.nick||r.playerId;
        result[r.playerId].selfRake = parseFloat(r.rake)||0;
        result[r.playerId].selfPnl = parseFloat(r.pnl)||0;
      }
    }
  });

  // Step 2: 代理本人加入自己的 players（第一位）
  Object.entries(result).forEach(([aid, d]) => {
    d.players.push({ id: aid, nick: d.nick, rake: d.selfRake, pnl: d.selfPnl||0, pct: 30, isSelf: true });
  });

  // Step 3: 分配所有 Player
  rows.forEach(r => {
    if (r.type === 'Agent') return;
    if (!r.playerId) return;
    const owner = getOwner(r);
    if (!owner) return; // 無法判斷歸屬則略過

    // 若 owner 不在 result 中，建立空代理
    if (!result[owner]) {
      result[owner] = { nick: owner, selfRake: 0, selfPnl: 0, players:[
        {id: owner, nick: owner, rake: 0, pnl: 0, pct: 30, isSelf: true}
      ]};
    }
    const dup = result[owner].players.some(p => p.id === r.playerId);
    if (!dup) {
      result[owner].players.push({ id: r.playerId, nick: r.nick||r.playerId, rake: parseFloat(r.rake)||0, pnl: parseFloat(r.pnl)||0, pct: 30, isSelf: false });
    }
  });

  return result;
}

// ── 渲染 ─────────────────────────────────────────────
function renderAll() {
  let html = '';

  Object.entries(grouped).forEach(([agentId, d]) => {
    const safeA = safe(agentId);
    const agentRebate = calcAgentRebate(d);

    html += `<div class="agent-block" id="ab_${safeA}"
      ondragover="onDragOver(event,'${escAttr(agentId)}')"
      ondragleave="onDragLeave(event,'${escAttr(agentId)}')"
      ondrop="onDrop(event,'${escAttr(agentId)}')">

      <div class="agent-header">
        <div class="agent-header-top" onclick="toggleAgentDetail('${safeA}')">
          <div>
            <div class="agent-name">代理：${escHtml(d.nick)} <span class="expand-icon" id="aicon_${safeA}">▼</span></div>
            <div class="agent-sub">${escHtml(agentId)} ／ <span id="cnt_${safeA}">${d.players.length}</span> 人</div>
          </div>
          <div class="agent-totals">
            <div class="agent-self-rake">Rake $${fmt(calcAgentTotalRake(d))}</div>
            <div class="agent-rebate-total">退水 $<span id="agt_${safeA}">${fmt(agentRebate)}</span></div>
          </div>
        </div>
        <div class="detail-panel" id="adp_${safeA}">
          ${agentDetailHTML(agentId, d)}
        </div>
      </div>
      <div class="drop-hint">📥 放開以移入此代理</div>
      <div id="players_${safeA}">`;

    d.players.forEach((p, idx) => { html += playerRowHTML(agentId, idx, p); });
    html += `</div></div>`;
  });

  // 總覽面板
  html += summaryHTML();
  document.getElementById('out').innerHTML = html;
}

function playerRowHTML(agentId, idx, p) {
  const safeP = safe(agentId+'_'+idx);
  const rebate = p.rake * (p.pct||0) / 100;
  const selfTag = p.isSelf ? ' <span style="font-size:10px;color:var(--gold);opacity:.7">(代理)</span>' : '';
  const agentIds = Object.keys(grouped);

  // Build move-to menu options
  const moveOpts = p.isSelf ? '' : agentIds.map(aid =>
    `<div class="move-option${aid===agentId?' current':''}" onclick="movePlayerTo('${safe(agentId)}','${safe(aid)}',${idx});event.stopPropagation()">` +
    `${aid===agentId?'✓ ':''}${escHtml(grouped[aid].nick)}</div>`
  ).join('');

  const moveBtn = p.isSelf ? '' :
    `<div class="move-wrap" onclick="event.stopPropagation()">
      <button class="move-btn" onclick="toggleMoveMenu('${safeP}');event.stopPropagation()">移至▾</button>
      <div class="move-menu" id="mm_${safeP}">${moveOpts}</div>
    </div>`;

  return `<div class="player-row${p.isSelf?' is-agent-self':''}" id="pr_${safeP}"
    draggable="${p.isSelf?'false':'true'}"
    ondragstart="${p.isSelf?'void(0)':'onDragStart(event,''+safe(agentId)+'','+idx+')'}"
    ondragend="onDragEnd(event,'${safeP}')">
    <span class="drag-handle" onclick="event.stopPropagation()">${p.isSelf?'　':'⠿'}</span>
    <div class="player-info" onclick="togglePlayerDetail('${safeP}');event.stopPropagation()" style="cursor:pointer;flex:1;min-width:0">
      <div class="p-nick">${escHtml(p.nick||'-')}${selfTag} <span class="expand-icon" id="picon_${safeP}" style="font-size:9px">▼</span></div>
      <div class="p-id">${escHtml(p.id||'')}</div>
      <div class="p-rake">Rake $${fmt(p.rake)}</div>
      <div class="detail-panel" id="pdp_${safeP}" onclick="event.stopPropagation()">
        ${playerDetailHTML(p)}
      </div>
    </div>
    ${moveBtn}
    <div class="pct-ctrl" onclick="event.stopPropagation()">
      <button class="pct-btn" id="btn_m_${safeP}" onclick="stepPct('${safe(agentId)}',${idx},-5);event.stopPropagation()">−</button>
      <div class="pct-val" id="pv_${safeP}">${p.pct}%</div>
      <button class="pct-btn" id="btn_p_${safeP}" onclick="stepPct('${safe(agentId)}',${idx},+5);event.stopPropagation()">+</button>
    </div>
    <div class="rebate-amt" id="pamt_${safeP}">$${fmt(rebate)}</div>
  </div>`;
}

function summaryHTML() {
  const totalRake = Object.values(grouped).reduce((s,d) => s+calcAgentTotalRake(d), 0);
  const totalRebate = Object.values(grouped).reduce((s,d) => s+calcAgentRebate(d), 0);
  const myActual = totalRebate * myCutPct / 100;

  return `<div class="summary-panel">
    <div class="summary-title">📊 總覽</div>
    <div class="summary-grid">
      <div class="summary-cell">
        <div class="sc-label">總 RAKE</div>
        <div class="sc-val">$<span id="s_rake">${fmt(totalRake)}</span></div>
      </div>
      <div class="summary-cell">
        <div class="sc-label">總退水金額</div>
        <div class="sc-val">$<span id="s_rebate">${fmt(totalRebate)}</span></div>
      </div>
    </div>
    <div class="my-cut-row">
      <div class="my-cut-label">我實際拿到</div>
      <div class="my-cut-ctrl">
        <button class="pct-btn" onclick="stepMyCut(-5)">−</button>
        <div class="pct-val" id="mycut_pct" style="width:46px">${myCutPct}%</div>
        <button class="pct-btn" onclick="stepMyCut(+5)">+</button>
      </div>
      <div class="my-cut-result">$<span id="s_mycut">${fmt(myActual)}</span></div>
    </div>
  </div>`;
}

// ── % 操作 ────────────────────────────────────────────
function stepPct(agentId, idx, delta) {
  if (!grouped[agentId]?.players[idx]) return;
  const p = grouped[agentId].players[idx];
  p.pct = Math.min(100, Math.max(0, (p.pct||0) + delta));

  const safeP = safe(agentId+'_'+idx);
  const pvEl = document.getElementById('pv_'+safeP);
  const amtEl = document.getElementById('pamt_'+safeP);
  if (pvEl) pvEl.textContent = p.pct+'%';
  if (amtEl) amtEl.textContent = '$'+fmt(p.rake*p.pct/100);

  refreshTotals(agentId);
}

function stepMyCut(delta) {
  myCutPct = Math.min(100, Math.max(0, myCutPct + delta));
  const el = document.getElementById('mycut_pct');
  if (el) el.textContent = myCutPct+'%';
  refreshSummary();
}

function refreshTotals(agentId) {
  const d = grouped[agentId];
  const safeA = safe(agentId);
  const agtEl = document.getElementById('agt_'+safeA);
  if (agtEl) agtEl.textContent = fmt(calcAgentRebate(d));
  refreshSummary();
}

function refreshSummary() {
  const totalRake = Object.values(grouped).reduce((s,d) => s+calcAgentTotalRake(d), 0);
  const totalRebate = Object.values(grouped).reduce((s,d) => s+calcAgentRebate(d), 0);
  const myActual = totalRebate * myCutPct / 100;
  const rEl = document.getElementById('s_rake');
  const rebEl = document.getElementById('s_rebate');
  const mycEl = document.getElementById('s_mycut');
  if (rEl) rEl.textContent = fmt(totalRake);
  if (rebEl) rebEl.textContent = fmt(totalRebate);
  if (mycEl) mycEl.textContent = fmt(myActual);
}

// ── 拖曳 ─────────────────────────────────────────────
function onDragStart(e, agentId, idx) {
  // agentId here is already safe() encoded from the template
  dragState = { agentId, idx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', agentId+'|'+idx);
  setTimeout(() => {
    const el = document.getElementById('pr_'+safe(agentId+'_'+idx));
    if (el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd(e, safeP) {
  // Always restore opacity when drag ends
  const el = document.getElementById('pr_'+safeP);
  if (el) el.classList.remove('dragging');
  // Clear all drag-over highlights
  document.querySelectorAll('.agent-block.drag-over').forEach(b => b.classList.remove('drag-over'));
  dragState = null;
}
function onDragOver(e, agentId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.getElementById('ab_'+safe(agentId));
  if (el) el.classList.add('drag-over');
}
function onDragLeave(e, agentId) {
  const el = document.getElementById('ab_'+safe(agentId));
  if (el && !el.contains(e.relatedTarget)) el.classList.remove('drag-over');
}
function onDrop(e, toAgentId) {
  e.preventDefault();
  const el = document.getElementById('ab_'+safe(toAgentId));
  if (el) el.classList.remove('drag-over');
  if (!dragState) return;
  const { agentId: from, idx } = dragState;
  dragState = null;
  // find actual keys (dragState uses safe keys, grouped uses original keys)
  const fromKey = findGroupKey(from);
  const toKey = findGroupKey(toAgentId);
  if (!fromKey || !toKey || fromKey === toKey) return;
  const [player] = grouped[fromKey].players.splice(idx, 1);
  grouped[toKey].players.push(player);
  renderAll();
}

function findGroupKey(safeId) {
  // Try direct match first
  if (grouped[safeId]) return safeId;
  // Find by safe() match
  return Object.keys(grouped).find(k => safe(k) === safeId) || null;
}

function movePlayerTo(fromSafe, toSafe, idx) {
  closeAllMoveMenus();
  const fromKey = findGroupKey(fromSafe);
  const toKey = findGroupKey(toSafe);
  if (!fromKey || !toKey || fromKey === toKey) return;
  const [player] = grouped[fromKey].players.splice(idx, 1);
  grouped[toKey].players.push(player);
  renderAll();
}

function toggleMoveMenu(safeP) {
  const mm = document.getElementById('mm_'+safeP);
  if (!mm) return;
  const isOpen = mm.classList.contains('open');
  closeAllMoveMenus();
  if (!isOpen) mm.classList.add('open');
}
function closeAllMoveMenus() {
  document.querySelectorAll('.move-menu.open').forEach(m => m.classList.remove('open'));
}
document.addEventListener('click', closeAllMoveMenus);

// ── 計算 ─────────────────────────────────────────────
// ── 詳細資訊 HTML ────────────────────────────────────
function playerDetailHTML(p) {
  const rebate = p.rake * (p.pct||0) / 100;
  const net = (p.pnl||0) - rebate;
  const pnlClass = (p.pnl||0) >= 0 ? 'pos' : 'neg';
  const netClass = net >= 0 ? 'pos' : 'neg';
  return `
    <div class="detail-row">
      <span class="detail-label">總輸贏（純輸贏）</span>
      <span class="detail-val ${pnlClass}">$${fmt(p.pnl||0)}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">應退水金額（${p.pct||0}%）</span>
      <span class="detail-val neutral">+ $${fmt(rebate)}</span>
    </div>
    <div class="detail-row" style="border-top:1px solid #333;margin-top:2px;padding-top:6px">
      <span class="detail-label" style="color:var(--text);font-weight:700">實際結算</span>
      <span class="detail-val ${netClass}" style="font-size:14px">$${fmt(net)}</span>
    </div>`;
}

function agentDetailHTML(agentId, d) {
  const totalPnl = d.players.reduce((s,p) => s+(p.pnl||0), 0);
  const totalRebate = calcAgentRebate(d);
  const net = totalPnl - totalRebate;
  const pnlClass = totalPnl >= 0 ? 'pos' : 'neg';
  const netClass = net >= 0 ? 'pos' : 'neg';
  return `
    <div class="detail-row">
      <span class="detail-label">區域總輸贏（含代理本人）</span>
      <span class="detail-val ${pnlClass}">$${fmt(totalPnl)}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">應退水總額</span>
      <span class="detail-val neutral">+ $${fmt(totalRebate)}</span>
    </div>
    <div class="detail-row" style="border-top:1px solid #333;margin-top:2px;padding-top:6px">
      <span class="detail-label" style="color:var(--text);font-weight:700">區域實際結算</span>
      <span class="detail-val ${netClass}" style="font-size:14px">$${fmt(net)}</span>
    </div>`;
}

function togglePlayerDetail(safeP) {
  const dp = document.getElementById('pdp_'+safeP);
  const icon = document.getElementById('picon_'+safeP);
  if (!dp) return;
  const isOpen = dp.classList.toggle('open');
  if (icon) icon.classList.toggle('open', isOpen);
}

function toggleAgentDetail(safeA) {
  const dp = document.getElementById('adp_'+safeA);
  const icon = document.getElementById('aicon_'+safeA);
  if (!dp) return;
  const isOpen = dp.classList.toggle('open');
  if (icon) icon.classList.toggle('open', isOpen);
}

function calcAgentRebate(d) {
  return d.players.reduce((s,p) => s+p.rake*(p.pct||0)/100, 0);
}
function calcAgentTotalRake(d) {
  return d.players.reduce((s,p) => s+p.rake, 0);
}

function fmt(n){return parseFloat(n).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/'/g,"\\'");}
function safe(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_');}

loadKey();
</script>
