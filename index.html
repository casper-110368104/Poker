<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退傭試算 (正式啟用版)</title>
<style>
  :root { --bg: #0a0a0a; --gold: #c9a84c; --text: #f0f0f0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; max-width: 430px; margin: 0 auto; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
  .btn { background: var(--gold); color: black; padding: 10px 20px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
  .status { text-align: center; margin-top: 30px; color: #666; }
  table { width: 100%; margin-top: 20px; border-collapse: collapse; }
  td { padding: 15px 5px; border-bottom: 1px solid #222; }
</style>
</head>
<body>
<div class="header">
  <b style="color:var(--gold)">♠ 退傭試算</b>
  <button onclick="setKey()">⚙️</button>
</div>
<div style="text-align:center; margin-top:30px">
  <button class="btn" onclick="document.getElementById('f').click()">📷 導入圖片開始分析</button>
</div>
<input type="file" id="f" hidden accept="image/*" onchange="run(event)">
<div id="out" class="status">尚未載入資料</div>

<script>
function setKey() { 
  const k = prompt("請貼上剛才 Create 的新 Key:", localStorage.getItem('g_key')||""); 
  if(k) { localStorage.setItem('g_key', k.trim()); alert("Key 已儲存，請等 1 分鐘後再測試！"); }
}

async function run(e) {
  const file = e.target.files[0]; 
  const key = localStorage.getItem('g_key');
  if(!key) { setKey(); return; }
  
  const out = document.getElementById('out');
  out.innerHTML = "AI 正在讀取圖片內容，請稍後...";

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    // 鎖定最標準的 v1beta 1.5-flash 路徑
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
    
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: "提取表格中的玩家ID、暱稱(Nick)和服務費(Rake)，以 JSON 回傳: {players:[{id,nick,rake}]}" },
              { inline_data: { mime_type: file.type, data: base64 } }
            ]
          }]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.candidates[0].content.parts[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      const ps = JSON.parse(jsonMatch[0]).players;
      
      let h = '<table>';
      ps.forEach(p => {
        h += `<tr><td>${p.nick}<br><small style="color:#555">${p.id}</small></td><td style="text-align:right; color:var(--gold)">$${p.rake}</td></tr>`;
      });
      out.innerHTML = h + '</table>';
    } catch (err) {
      out.innerHTML = "分析出錯：" + err.message + "<br><br>請確認是否已等待 1-3 分鐘讓新 Key 生效。";
    }
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
